apiVersion: apps/v1
kind: Deployment

metadata:
  name: az-cli
  labels:
    app: az-cli
    Deployed: "true"
    creator: AJ
    env: dev
  namespace: nginx-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: az-cli
      env: dev

  template:
    metadata:
      labels:
        app: az-cli
        env: dev
        azure.workload.identity/use: "true"

    spec:
      serviceAccountName: az-cli-sa

      containers:
        - name: az-cli
          image: mcr.microsoft.com/azure-cli:latest

          command:
            - /bin/sh
            - -c
            - |
              echo "Azure CLI pod started"
              sleep infinity